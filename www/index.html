<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Cámara</title>
<style>
  :root{
    --accent:#F5A623;
    --glass:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.20);
    --txt:#fff;
    --num:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;color:var(--txt);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    user-select:none;-webkit-user-select:none;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* Visor */
  #stage{position:relative;flex:1;overflow:hidden;background:#000;}
  #video{width:100%;height:100%;object-fit:cover;display:block;background:#000;
    transition:filter .15s ease;transform-origin:center center;}

  /* Marco de proporción */
  #ratioFrame{position:absolute;pointer-events:none;border:1px solid rgba(255,255,255,.55);
    box-shadow:0 0 0 9999px rgba(0,0,0,.45);display:none;}
  #ratioFrame.on{display:block;}

  /* Cuadrícula */
  #grid{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;}
  #grid.on{opacity:1;}
  #grid::before,#grid::after,#grid span::before,#grid span::after{content:"";position:absolute;
    background:rgba(255,255,255,.35);}
  #grid::before{left:33.33%;top:0;bottom:0;width:1px;}
  #grid::after{left:66.66%;top:0;bottom:0;width:1px;}
  #grid span::before{top:33.33%;left:0;right:0;height:1px;}
  #grid span::after{top:66.66%;left:0;right:0;height:1px;}

  /* Anillo de enfoque */
  #focusRing{position:absolute;width:74px;height:74px;border:2px solid var(--accent);
    border-radius:8px;margin:-37px 0 0 -37px;opacity:0;pointer-events:none;}
  #focusRing.show{animation:focusPop .9s ease;}
  @keyframes focusPop{0%{opacity:0;transform:scale(1.4)}15%{opacity:1;transform:scale(1)}
    70%{opacity:1}100%{opacity:0}}

  #screenFlash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}
  #screenFlash.fire{animation:flashPulse .6s ease;}
  @keyframes flashPulse{0%{opacity:0}10%{opacity:.95}100%{opacity:0}}
  #shutterFlash{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;}
  #shutterFlash.fire{animation:shutPulse .25s ease;}
  @keyframes shutPulse{0%{opacity:0}30%{opacity:.85}100%{opacity:0}}

  #countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-family:var(--num);font-size:34vw;font-weight:700;color:#fff;text-shadow:0 4px 40px rgba(0,0,0,.6);}
  #countdown.on{display:flex;animation:tick 1s ease infinite;}
  @keyframes tick{0%{transform:scale(.7);opacity:0}25%{opacity:1}80%{transform:scale(1);opacity:1}100%{opacity:0}}

  #notice{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;padding:32px;text-align:center;}
  #notice.on{display:flex;}
  #notice .ico{font-size:54px;}
  #notice p{max-width:300px;line-height:1.5;color:rgba(255,255,255,.85);}
  #notice button{margin-top:8px;padding:13px 26px;border:none;border-radius:30px;
    background:var(--accent);color:#1a1200;font-weight:700;font-size:16px;}

  /* Barra superior (desplazable) */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:5;
    padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;
    display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
    background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);}
  #topbar::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:5px;
    min-width:44px;height:42px;padding:0 11px;border-radius:21px;background:var(--glass);
    border:1px solid var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font-size:12px;font-weight:600;transition:transform .12s,background .2s;}
  .pill:active{transform:scale(.92);}
  .pill.active{background:var(--accent);color:#1a1200;border-color:transparent;}
  .pill .ico{font-size:18px;line-height:1;}
  .pill[hidden]{display:none;}

  /* Zoom */
  #zoomWrap{position:absolute;left:0;right:0;bottom:96px;z-index:4;display:none;justify-content:center;}
  #zoomWrap.on{display:flex;}
  #zoomWrap input{width:64%;accent-color:var(--accent);}

  /* Panel de filtros */
  #fxPanel{position:absolute;left:0;right:0;bottom:0;z-index:6;
    background:rgba(10,10,12,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-top:1px solid var(--border);padding:14px 14px calc(env(safe-area-inset-bottom) + 14px);
    transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);}
  #fxPanel.on{transform:translateY(0);}
  #fxRow{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
  #fxRow::-webkit-scrollbar{display:none;}
  .fx{flex:0 0 auto;width:64px;text-align:center;font-size:11px;color:rgba(255,255,255,.8);}
  .fx .sw{width:56px;height:56px;border-radius:13px;border:2px solid transparent;margin-bottom:5px;
    background-size:cover;background-position:center;
    background-image:linear-gradient(135deg,#777,#bbb);}
  .fx.active{color:var(--accent);}
  .fx.active .sw{border-color:var(--accent);}
  .adjust{margin-top:12px;display:flex;flex-direction:column;gap:9px;}
  .adjust label{display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,.85);}
  .adjust label span{width:78px;}
  .adjust input{flex:1;accent-color:var(--accent);}
  #fxReset{margin-top:12px;width:100%;padding:11px;border:1px solid var(--border);border-radius:12px;
    background:transparent;color:#fff;font-size:14px;font-weight:600;}

  /* Barra inferior */
  #bottombar{position:relative;z-index:5;padding:16px 28px calc(env(safe-area-inset-bottom) + 20px);
    display:grid;grid-template-columns:60px 1fr 60px;align-items:center;
    background:linear-gradient(to top,rgba(0,0,0,.6),transparent);}
  #thumb{width:54px;height:54px;border-radius:14px;border:2px solid var(--border);overflow:hidden;
    background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:21px;}
  #thumb img{width:100%;height:100%;object-fit:cover;}
  #shutter{justify-self:center;width:78px;height:78px;border-radius:50%;border:none;background:transparent;
    position:relative;display:grid;place-items:center;}
  #shutter .ring{position:absolute;inset:0;border-radius:50%;border:4px solid rgba(255,255,255,.9);}
  #shutter .core{width:62px;height:62px;border-radius:50%;background:#fff;transition:transform .12s,background .2s;}
  #shutter:active .core{transform:scale(.86);}
  #shutter.busy .core{background:var(--accent);}
  #shutter svg{position:absolute;inset:-2px;width:82px;height:82px;transform:rotate(-90deg);opacity:0;transition:opacity .2s;}
  #shutter.timing svg{opacity:1;}
  #shutter circle{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;}
  #flip{justify-self:center;width:54px;height:54px;border-radius:50%;background:var(--glass);
    border:1px solid var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font-size:23px;display:grid;place-items:center;transition:transform .3s;}
  #flip:active{transform:rotate(180deg) scale(.9);}

  /* Indicador de escucha */
  #earBadge{position:absolute;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 100px);z-index:5;display:none;align-items:center;gap:8px;
    padding:7px 14px;border-radius:20px;background:rgba(0,0,0,.55);border:1px solid var(--border);
    font-size:12px;backdrop-filter:blur(10px);}
  #earBadge.on{display:flex;}
  #level{width:60px;height:6px;border-radius:3px;background:rgba(255,255,255,.2);overflow:hidden;}
  #levelBar{height:100%;width:0;background:var(--accent);transition:width .05s linear;}

  /* Galería en cuadrícula */
  #galleryGrid{position:fixed;inset:0;z-index:18;background:#0b0b0d;display:none;flex-direction:column;}
  #galleryGrid.on{display:flex;}
  #galleryGrid .ghead{display:flex;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;font-size:17px;font-weight:600;}
  #galleryGrid .ghead button{background:none;border:none;color:#fff;font-size:22px;}
  #grid-scroll{flex:1;overflow-y:auto;padding:4px;display:grid;
    grid-template-columns:repeat(3,1fr);gap:4px;align-content:start;}
  #grid-scroll img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;}
  #galEmpty{padding:60px 20px;text-align:center;color:rgba(255,255,255,.6);grid-column:1/-1;}

  /* Visor de foto */
  #viewer{position:fixed;inset:0;z-index:20;background:#000;display:none;flex-direction:column;}
  #viewer.on{display:flex;}
  #viewer .pic{flex:1;display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 0 0;}
  #viewer img{max-width:100%;max-height:100%;object-fit:contain;}
  #viewer .bar{display:flex;justify-content:space-around;align-items:center;
    padding:18px 16px calc(env(safe-area-inset-bottom) + 18px);background:rgba(0,0,0,.7);}
  #viewer .bar button{background:none;border:none;color:#fff;font-size:13px;display:flex;
    flex-direction:column;align-items:center;gap:5px;padding:6px 14px;}
  #viewer .bar .ico{font-size:23px;}
  #viewer .bar .del{color:#ff6b6b;}
  #viewer .close{position:absolute;top:calc(env(safe-area-inset-top) + 12px);left:16px;width:42px;height:42px;
    border-radius:50%;background:var(--glass);border:1px solid var(--border);color:#fff;font-size:20px;backdrop-filter:blur(10px);}
  #toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(20px);
    z-index:40;background:rgba(20,20,22,.95);border:1px solid var(--border);color:#fff;
    padding:11px 18px;border-radius:24px;font-size:14px;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;backdrop-filter:blur(10px);max-width:80%;text-align:center;}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" autoplay muted playsinline></video>
    <div id="ratioFrame"></div>
    <div id="grid"><span></span></div>
    <div id="focusRing"></div>
    <div id="shutterFlash"></div>
    <div id="screenFlash"></div>
    <div id="countdown"></div>

    <div id="notice">
      <div class="ico">📷</div>
      <p id="noticeTxt">Necesito permiso para usar la cámara. Acéptalo y pulsa el botón.</p>
      <button id="retry">Activar cámara</button>
    </div>

    <div id="topbar">
      <button class="pill" id="btnFlash"><span class="ico">⚡</span><span id="flashLbl">Off</span></button>
      <button class="pill" id="btnTimer"><span class="ico">⏱</span><span id="timerLbl">Off</span></button>
      <button class="pill" id="btnGrid"><span class="ico">▦</span></button>
      <button class="pill" id="btnRatio"><span class="ico">▭</span><span id="ratioLbl">Full</span></button>
      <button class="pill" id="btnEar"><span class="ico">👂</span></button>
      <button class="pill" id="btnFx"><span class="ico">🎨</span></button>
      <button class="pill" id="btnZoom" hidden><span class="ico">🔍</span><span id="zoomLbl">1×</span></button>
    </div>

    <div id="zoomWrap"><input type="range" id="zoom" min="1" max="1" step="0.1" value="1"></div>

    <div id="earBadge">
      <span class="ico">👂</span><span>Escuchando…</span>
      <div id="level"><div id="levelBar"></div></div>
    </div>
  </div>

  <div id="bottombar">
    <button id="thumb" aria-label="Galería"><span>🖼️</span></button>
    <button id="shutter" aria-label="Hacer foto">
      <svg viewBox="0 0 82 82"><circle id="prog" cx="41" cy="41" r="39"></circle></svg>
      <div class="ring"></div><div class="core"></div>
    </button>
    <button id="flip" aria-label="Cambiar cámara">🔄</button>
  </div>

  <!-- Panel de filtros -->
  <div id="fxPanel">
    <div id="fxRow"></div>
    <div class="adjust">
      <label><span>Brillo</span><input type="range" id="adjBri" min="0.5" max="1.5" step="0.02" value="1"></label>
      <label><span>Contraste</span><input type="range" id="adjCon" min="0.5" max="1.5" step="0.02" value="1"></label>
      <label><span>Saturación</span><input type="range" id="adjSat" min="0" max="2" step="0.02" value="1"></label>
    </div>
    <button id="fxReset">Restablecer</button>
  </div>
</div>

<!-- Galería -->
<div id="galleryGrid">
  <div class="ghead"><span>Galería</span><button id="galClose">✕</button></div>
  <div id="grid-scroll"></div>
</div>

<!-- Visor -->
<div id="viewer">
  <button class="close" id="vClose">✕</button>
  <div class="pic"><img id="vImg" alt="Foto"></div>
  <div class="bar">
    <button id="vShare"><span class="ico">📤</span>Compartir</button>
    <button id="vSave"><span class="ico">⬇️</span>Guardar</button>
    <button id="vDel" class="del"><span class="ico">🗑️</span>Borrar</button>
  </div>
</div>

<canvas id="canvas" class="hidden"></canvas>
<div id="toast"></div>

<script>
"use strict";
(function(){
  const $=id=>document.getElementById(id);
  const video=$('video'),canvas=$('canvas'),stage=$('stage'),grid=$('grid'),
    ratioFrame=$('ratioFrame'),focusRing=$('focusRing'),notice=$('notice'),noticeTxt=$('noticeTxt'),
    shutter=$('shutter'),prog=$('prog'),thumb=$('thumb'),flip=$('flip'),
    sFlash=$('screenFlash'),shutFlash=$('shutterFlash'),countdown=$('countdown'),
    btnFlash=$('btnFlash'),btnTimer=$('btnTimer'),btnGrid=$('btnGrid'),btnRatio=$('btnRatio'),
    btnEar=$('btnEar'),btnFx=$('btnFx'),btnZoom=$('btnZoom'),
    flashLbl=$('flashLbl'),timerLbl=$('timerLbl'),ratioLbl=$('ratioLbl'),zoomLbl=$('zoomLbl'),
    zoomWrap=$('zoomWrap'),zoom=$('zoom'),
    fxPanel=$('fxPanel'),fxRow=$('fxRow'),adjBri=$('adjBri'),adjCon=$('adjCon'),adjSat=$('adjSat'),fxReset=$('fxReset'),
    earBadge=$('earBadge'),levelBar=$('levelBar'),
    galleryGrid=$('galleryGrid'),gridScroll=$('grid-scroll'),galClose=$('galClose'),
    viewer=$('viewer'),vImg=$('vImg'),vClose=$('vClose'),vShare=$('vShare'),vSave=$('vSave'),vDel=$('vDel');

  let stream=null,track=null,caps={},busy=false,facing='environment';
  const FLASH=['off','flash','torch'],FLASH_LBL={off:'Off',flash:'Flash',torch:'Linterna'};
  let flashMode='off';
  const TIMERS=[0,3,10];let timerIdx=0;
  let gridOn=false;
  const RATIOS=[{n:'Full',r:null},{n:'1:1',r:1},{n:'4:3',r:3/4},{n:'16:9',r:9/16}];
  let ratioIdx=0;
  let photos=[];           // {id,url,ts}
  let viewerId=null;

  // Filtros
  const PRESETS=[
    {k:'normal',n:'Normal',f:''},
    {k:'bn',n:'B/N',f:'grayscale(1)'},
    {k:'sepia',n:'Sepia',f:'sepia(.8)'},
    {k:'vivo',n:'Vivo',f:'saturate(1.6) contrast(1.1)'},
    {k:'frio',n:'Frío',f:'hue-rotate(-12deg) saturate(1.15) brightness(1.03)'},
    {k:'calido',n:'Cálido',f:'sepia(.25) saturate(1.3) brightness(1.05)'},
    {k:'noir',n:'Noir',f:'grayscale(1) contrast(1.35) brightness(.95)'},
  ];
  let presetKey='normal';
  let adj={bri:1,con:1,sat:1};

  const R=39,CIRC=2*Math.PI*R;
  prog.style.strokeDasharray=CIRC;prog.style.strokeDashoffset=CIRC;

  // ---------- Cámara ----------
  let micWanted=false;            // si el usuario activó el oído, pedimos audio junto a la cámara
  async function startCamera(){
    notice.classList.remove('on');stopStream();
    const c={audio:micWanted,video:{facingMode:facing==='user'?'user':{ideal:'environment'},
      width:{ideal:1920},height:{ideal:1080}}};
    try{stream=await navigator.mediaDevices.getUserMedia(c);}
    catch(e){try{stream=await navigator.mediaDevices.getUserMedia({audio:micWanted,video:true});}
      catch(err){return showNotice(err);}}
    video.srcObject=stream;track=stream.getVideoTracks()[0];
    try{caps=track.getCapabilities?track.getCapabilities():{};}catch(_){caps={};}
    setupZoom();refreshFlashUI();applyFlashState();
    video.onloadedmetadata=()=>recomputeRatio();
    setTimeout(recomputeRatio,300);
    if(micWanted&&stream.getAudioTracks().length)startAnalyser();
  }
  function stopStream(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;track=null;}}
  function showNotice(err){notice.classList.add('on');
    noticeTxt.textContent=(err&&(err.name==='NotAllowedError'||err.name==='SecurityError'))
      ?'Permiso de cámara denegado. Actívalo en los ajustes de la app.'
      :'No se pudo iniciar la cámara. Pulsa el botón para reintentar.';}

  // ---------- Zoom (nativo si existe, digital por pellizco si no) ----------
  let nativeZoom=false,minZ=1,maxZ=5,zoomLevel=1;
  function setupZoom(){
    nativeZoom=!!(caps.zoom&&caps.zoom.max>caps.zoom.min);
    if(nativeZoom){minZ=caps.zoom.min||1;maxZ=caps.zoom.max;
      zoomLevel=track.getSettings().zoom||minZ;}
    else{minZ=1;maxZ=5;zoomLevel=1;}
    btnZoom.hidden=false;                    // el botón ahora siempre se ve
    zoom.min=minZ;zoom.max=maxZ;zoom.step=0.1;zoom.value=zoomLevel;
    applyZoom(zoomLevel);
  }
  const fmtZoom=v=>(Math.round(v*10)/10).toString().replace('.0','')+'×';
  function videoTransform(){
    const s=nativeZoom?1:zoomLevel;                 // digital escala el vídeo
    return (facing==='user'?`scaleX(${-s}) scaleY(${s})`:`scale(${s})`);
  }
  async function applyZoom(v){
    zoomLevel=Math.max(minZ,Math.min(maxZ,v));
    zoomLbl.textContent=fmtZoom(zoomLevel);
    zoom.value=zoomLevel;
    if(nativeZoom&&track){try{await track.applyConstraints({advanced:[{zoom:zoomLevel}]});}catch(_){}}
    video.style.transform=videoTransform();
  }
  zoom.addEventListener('input',()=>applyZoom(parseFloat(zoom.value)));
  btnZoom.addEventListener('click',()=>zoomWrap.classList.toggle('on'));

  // Pellizco con dos dedos sobre el visor
  let pinchStart=0,pinchBase=1;
  function dist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.hypot(dx,dy);}
  stage.addEventListener('touchstart',e=>{if(e.touches.length===2){pinchStart=dist(e.touches);pinchBase=zoomLevel;}},{passive:true});
  stage.addEventListener('touchmove',e=>{if(e.touches.length===2&&pinchStart){
    e.preventDefault();applyZoom(pinchBase*(dist(e.touches)/pinchStart));}},{passive:false});
  stage.addEventListener('touchend',e=>{if(e.touches.length<2)pinchStart=0;});

  // ---------- Flash ----------
  function refreshFlashUI(){
    if(facing==='environment'&&!caps.torch&&flashMode==='torch')flashMode='flash';
    flashLbl.textContent=FLASH_LBL[flashMode];btnFlash.classList.toggle('active',flashMode!=='off');}
  btnFlash.addEventListener('click',()=>{let i=FLASH.indexOf(flashMode);
    do{i=(i+1)%FLASH.length;}while(FLASH[i]==='torch'&&!(facing==='environment'&&caps.torch));
    flashMode=FLASH[i];applyFlashState();refreshFlashUI();});
  async function applyFlashState(){if(track&&caps.torch){
    const on=(flashMode==='torch'&&facing==='environment');
    try{await track.applyConstraints({advanced:[{torch:on}]});}catch(_){}}}

  // ---------- Temporizador / Cuadrícula ----------
  btnTimer.addEventListener('click',()=>{timerIdx=(timerIdx+1)%TIMERS.length;
    const t=TIMERS[timerIdx];timerLbl.textContent=t===0?'Off':t+'s';btnTimer.classList.toggle('active',t!==0);});
  btnGrid.addEventListener('click',()=>{gridOn=!gridOn;grid.classList.toggle('on',gridOn);
    btnGrid.classList.toggle('active',gridOn);});

  // ---------- Proporción ----------
  btnRatio.addEventListener('click',()=>{ratioIdx=(ratioIdx+1)%RATIOS.length;
    ratioLbl.textContent=RATIOS[ratioIdx].n;btnRatio.classList.toggle('active',ratioIdx!==0);recomputeRatio();});
  function recomputeRatio(){
    const R0=RATIOS[ratioIdx].r;
    if(!R0||!video.videoWidth){ratioFrame.classList.remove('on');return;}
    const sw=video.videoWidth,sh=video.videoHeight,stW=stage.clientWidth,stH=stage.clientHeight;
    const scale=Math.max(stW/sw,stH/sh),dW=sw*scale,dH=sh*scale,oX=(stW-dW)/2,oY=(stH-dH)/2;
    let cw,ch;
    if(sw/sh>R0){ch=sh;cw=sh*R0;}else{cw=sw;ch=sw/R0;}
    const cx=(sw-cw)/2,cy=(sh-ch)/2;
    ratioFrame.style.left=(oX+cx*scale)+'px';ratioFrame.style.top=(oY+cy*scale)+'px';
    ratioFrame.style.width=(cw*scale)+'px';ratioFrame.style.height=(ch*scale)+'px';
    ratioFrame.classList.add('on');
  }
  window.addEventListener('resize',recomputeRatio);

  // ---------- Filtros ----------
  PRESETS.forEach(p=>{
    const el=document.createElement('button');el.className='fx'+(p.k==='normal'?' active':'');
    el.dataset.k=p.k;el.innerHTML=`<div class="sw" style="filter:${p.f||'none'}"></div>${p.n}`;
    el.addEventListener('click',()=>{presetKey=p.k;
      document.querySelectorAll('.fx').forEach(x=>x.classList.toggle('active',x.dataset.k===p.k));
      applyFilter();});
    fxRow.appendChild(el);
  });
  function buildFilter(){
    const p=PRESETS.find(x=>x.k===presetKey).f;
    return `brightness(${adj.bri}) contrast(${adj.con}) saturate(${adj.sat}) ${p}`.trim();
  }
  function applyFilter(){video.style.filter=buildFilter();}
  [['adjBri','bri'],['adjCon','con'],['adjSat','sat']].forEach(([id,k])=>{
    $(id).addEventListener('input',e=>{adj[k]=parseFloat(e.target.value);applyFilter();});});
  fxReset.addEventListener('click',()=>{presetKey='normal';adj={bri:1,con:1,sat:1};
    adjBri.value=1;adjCon.value=1;adjSat.value=1;
    document.querySelectorAll('.fx').forEach(x=>x.classList.toggle('active',x.dataset.k==='normal'));applyFilter();});
  btnFx.addEventListener('click',()=>{const on=fxPanel.classList.toggle('on');btnFx.classList.toggle('active',on);});

  // ---------- Tocar para enfocar ----------
  stage.addEventListener('click',async e=>{
    if(e.target.closest('.pill,#bottombar,#zoomWrap,#fxPanel,#notice,#earBadge'))return;
    const r=stage.getBoundingClientRect();
    focusRing.style.left=(e.clientX-r.left)+'px';focusRing.style.top=(e.clientY-r.top)+'px';
    focusRing.classList.remove('show');void focusRing.offsetWidth;focusRing.classList.add('show');
    if(track){try{await track.applyConstraints({advanced:[{focusMode:'single-shot'}]});}catch(_){}}
  });

  // ---------- Cambiar cámara ----------
  flip.addEventListener('click',async()=>{if(busy)return;
    facing=facing==='user'?'environment':'user';await startCamera();});

  // ---------- Disparo ----------
  shutter.addEventListener('click',()=>{if(busy||!track)return;
    const s=TIMERS[timerIdx];if(s>0)runTimer(s).then(takePhoto);else takePhoto();});
  function runTimer(secs){busy=true;shutter.classList.add('busy','timing');
    return new Promise(res=>{let rem=secs;countdown.textContent=rem;countdown.classList.add('on');setProg(0);
      const start=performance.now(),total=secs*1000;
      const anim=()=>{const el=performance.now()-start;setProg(Math.min(el/total,1));if(el<total)requestAnimationFrame(anim);};
      requestAnimationFrame(anim);
      const t=setInterval(()=>{rem--;if(rem>0)countdown.textContent=rem;
        else{clearInterval(t);countdown.classList.remove('on');shutter.classList.remove('timing');setProg(0);res();}},1000);});}
  const setProg=p=>prog.style.strokeDashoffset=CIRC*(1-p);

  async function takePhoto(){
    busy=true;shutter.classList.add('busy');lastShot=Date.now();
    try{
      if(flashMode==='flash'){
        if(facing==='environment'&&caps.torch){try{await track.applyConstraints({advanced:[{torch:true}]});}catch(_){}await wait(120);}
        else{sFlash.classList.add('fire');await wait(160);}
      }
      drawFrame();
      shutFlash.classList.remove('fire');void shutFlash.offsetWidth;shutFlash.classList.add('fire');clickSound();
      const url=canvas.toDataURL('image/jpeg',0.92);
      await savePhoto(url);
    }catch(e){console.error(e);}
    finally{
      if(flashMode==='flash'&&facing==='environment'&&caps.torch){try{await track.applyConstraints({advanced:[{torch:false}]});}catch(_){}}
      sFlash.classList.remove('fire');busy=false;shutter.classList.remove('busy');
    }
  }
  function drawFrame(){
    const sw=video.videoWidth||1280,sh=video.videoHeight||720,R0=RATIOS[ratioIdx].r;
    let cw=sw,ch=sh,cx=0,cy=0;
    if(R0){if(sw/sh>R0){ch=sh;cw=sh*R0;}else{cw=sw;ch=sw/R0;}cx=(sw-cw)/2;cy=(sh-ch)/2;}
    // Zoom digital: recorta el centro (el nativo ya viene aplicado en el frame)
    if(!nativeZoom&&zoomLevel>1){const f=zoomLevel;cx+=cw*(1-1/f)/2;cy+=ch*(1-1/f)/2;cw/=f;ch/=f;}
    canvas.width=Math.round(cw);canvas.height=Math.round(ch);
    const ctx=canvas.getContext('2d');
    ctx.filter=buildFilter();
    if(facing==='user'){ctx.translate(canvas.width,0);ctx.scale(-1,1);}
    ctx.drawImage(video,cx,cy,cw,ch,0,0,canvas.width,canvas.height);
    ctx.setTransform(1,0,0,1,0,0);ctx.filter='none';
  }
  const wait=ms=>new Promise(r=>setTimeout(r,ms));

  // ---------- Autodisparo por sonido ----------
  let audioCtx=null,analyser=null,soundRAF=null,lastShot=0;
  btnEar.addEventListener('click',async()=>{
    if(micWanted){ // apagar
      micWanted=false;stopAnalyser();btnEar.classList.remove('active');earBadge.classList.remove('on');
      await startCamera();   // reabre la cámara sin audio
      return;
    }
    micWanted=true;btnEar.classList.add('active');earBadge.classList.add('on');
    await startCamera();     // reabre pidiendo cámara + micrófono juntos
    if(!stream||!stream.getAudioTracks().length){
      micWanted=false;btnEar.classList.remove('active');earBadge.classList.remove('on');
      alert('No se pudo activar el micrófono. Comprueba el permiso en Ajustes.');
    }
  });
  function startAnalyser(){
    stopAnalyser();
    try{
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      const src=audioCtx.createMediaStreamSource(stream);
      analyser=audioCtx.createAnalyser();analyser.fftSize=512;src.connect(analyser);
      const buf=new Uint8Array(analyser.fftSize);
      const loop=()=>{
        analyser.getByteTimeDomainData(buf);
        let sum=0;for(let i=0;i<buf.length;i++){const v=(buf[i]-128)/128;sum+=v*v;}
        const rms=Math.sqrt(sum/buf.length);
        levelBar.style.width=Math.min(100,rms*350)+'%';
        if(rms>0.18&&!busy&&Date.now()-lastShot>2500)takePhoto();
        soundRAF=requestAnimationFrame(loop);
      };loop();
    }catch(e){console.error(e);}
  }
  function stopAnalyser(){if(soundRAF)cancelAnimationFrame(soundRAF);soundRAF=null;
    if(audioCtx){try{audioCtx.close();}catch(_){}audioCtx=null;}levelBar.style.width='0';}
  function stopSound(){stopAnalyser();}

  let actx=null;
  function clickSound(){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=1100;
    g.gain.setValueAtTime(.05,actx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+.08);
    o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.08);}catch(_){}}

  // ---------- Almacenamiento (IndexedDB) ----------
  let db=null;
  function openDB(){return new Promise(res=>{
    const rq=indexedDB.open('camara_db',1);
    rq.onupgradeneeded=e=>{e.target.result.createObjectStore('photos',{keyPath:'id'});};
    rq.onsuccess=e=>{db=e.target.result;res();};
    rq.onerror=()=>res();
  });}
  function dbAdd(item){return new Promise(res=>{if(!db)return res();
    const tx=db.transaction('photos','readwrite');tx.objectStore('photos').put(item);tx.oncomplete=res;tx.onerror=res;});}
  function dbDel(id){return new Promise(res=>{if(!db)return res();
    const tx=db.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=res;tx.onerror=res;});}
  function dbAll(){return new Promise(res=>{if(!db)return res([]);
    const tx=db.transaction('photos','readonly');const rq=tx.objectStore('photos').getAll();
    rq.onsuccess=()=>res(rq.result||[]);rq.onerror=()=>res([]);});}

  async function savePhoto(url){
    const item={id:'p'+Date.now()+Math.random().toString(36).slice(2,6),url,ts:Date.now()};
    photos.unshift(item);await dbAdd(item);
    if(photos.length>200){const old=photos.pop();dbDel(old.id);}
    thumb.innerHTML=`<img src="${url}" alt="">`;
  }
  async function loadPhotos(){
    photos=(await dbAll()).sort((a,b)=>b.ts-a.ts);
    if(photos.length)thumb.innerHTML=`<img src="${photos[0].url}" alt="">`;
  }

  // ---------- Galería ----------
  thumb.addEventListener('click',openGallery);
  galClose.addEventListener('click',()=>galleryGrid.classList.remove('on'));
  function openGallery(){
    gridScroll.innerHTML='';
    if(!photos.length){gridScroll.innerHTML='<div id="galEmpty">Aún no has hecho ninguna foto.</div>';}
    else photos.forEach(p=>{const im=document.createElement('img');im.src=p.url;
      im.addEventListener('click',()=>openViewer(p.id));gridScroll.appendChild(im);});
    galleryGrid.classList.add('on');
  }
  function openViewer(id){viewerId=id;const p=photos.find(x=>x.id===id);if(!p)return;
    vImg.src=p.url;viewer.classList.add('on');}
  vClose.addEventListener('click',()=>viewer.classList.remove('on'));

  // Toast
  let toastT=null;
  function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');
    clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2600);}

  const CAP=()=>window.Capacitor&&window.Capacitor.Plugins?window.Capacitor.Plugins:null;
  const b64=p=>p.url.split(',')[1];
  const fname=p=>'Camara_'+new Date(p.ts).toISOString().replace(/[:.]/g,'-')+'.jpg';

  // Guardar en la galería del móvil (plugin Media) → respaldo: Documentos → descarga web
  vSave.addEventListener('click',async()=>{const p=photos.find(x=>x.id===viewerId);if(!p)return;
    const C=CAP();
    if(C&&C.Media){
      try{
        await C.Media.savePhoto({path:p.url,fileName:fname(p).replace(/\.jpg$/,'')});
        toast('Guardada en la galería ✅');return;
      }catch(e){console.error('Media.savePhoto falló',e);}
    }
    if(C&&C.Filesystem){
      try{
        await C.Filesystem.writeFile({path:fname(p),data:b64(p),directory:'DOCUMENTS',recursive:true});
        toast('Guardada en Documentos 📁');return;
      }catch(e){
        try{await C.Filesystem.writeFile({path:fname(p),data:b64(p),directory:'DATA',recursive:true});
          toast('Guardada en la app 📁');return;
        }catch(e2){console.error(e2);}
      }
    }
    download(p);
  });
  function download(p){const a=document.createElement('a');a.href=p.url;a.download=fname(p);
    document.body.appendChild(a);a.click();a.remove();toast('Descargada');}

  // Compartir (plugin Share)
  vShare.addEventListener('click',async()=>{const p=photos.find(x=>x.id===viewerId);if(!p)return;
    const C=CAP();
    if(C&&C.Filesystem&&C.Share){
      try{
        const tmp='share_'+Date.now()+'.jpg';
        await C.Filesystem.writeFile({path:tmp,data:b64(p),directory:'CACHE'});
        const u=await C.Filesystem.getUri({path:tmp,directory:'CACHE'});
        await C.Share.share({title:'Foto',files:[u.uri]});
        return;
      }catch(e){if(e&&/cancel/i.test(e.message||''))return;console.error(e);}
    }
    // Fallback web
    try{const blob=await(await fetch(p.url)).blob();const f=new File([blob],'foto.jpg',{type:'image/jpeg'});
      if(navigator.canShare&&navigator.canShare({files:[f]}))await navigator.share({files:[f],title:'Foto'});
      else download(p);}catch(_){download(p);}});
  vDel.addEventListener('click',async()=>{if(!viewerId)return;
    await dbDel(viewerId);photos=photos.filter(x=>x.id!==viewerId);
    viewer.classList.remove('on');
    thumb.innerHTML=photos.length?`<img src="${photos[0].url}" alt="">`:'<span>🖼️</span>';
    openGallery();});

  // ---------- Arranque ----------
  $('retry').addEventListener('click',startCamera);
  document.addEventListener('visibilitychange',()=>{if(document.hidden){stopStream();stopSound();}
    else if(!stream)startCamera();});

  (async()=>{
    await openDB();await loadPhotos();
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      notice.classList.add('on');noticeTxt.textContent='Este dispositivo no soporta el acceso a la cámara.';
    }else startCamera();
  })();
})();
</script>
</body>
</html>
