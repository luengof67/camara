<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Cámara</title>
<style>
  :root{
    --accent:#F5A623;      /* ámbar = luz/exposición */
    --glass:rgba(255,255,255,.08);
    --glass-strong:rgba(255,255,255,.14);
    --border:rgba(255,255,255,.20);
    --txt:#ffffff;
    --num:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;color:var(--txt);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    user-select:none;-webkit-user-select:none;}

  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ---------- Visor ---------- */
  #stage{position:relative;flex:1;overflow:hidden;background:#000;
    display:flex;align-items:center;justify-content:center;}
  #video{width:100%;height:100%;object-fit:cover;display:block;background:#000;}
  #video.mirror{transform:scaleX(-1);}

  /* Cuadrícula regla de tercios */
  #grid{position:absolute;inset:0;pointer-events:none;opacity:0;
    transition:opacity .2s ease;}
  #grid.on{opacity:1;}
  #grid::before,#grid::after,
  #grid span::before,#grid span::after{content:"";position:absolute;
    background:rgba(255,255,255,.35);box-shadow:0 0 1px rgba(0,0,0,.4);}
  #grid::before{left:33.33%;top:0;bottom:0;width:1px;}
  #grid::after{left:66.66%;top:0;bottom:0;width:1px;}
  #grid span::before{top:33.33%;left:0;right:0;height:1px;}
  #grid span::after{top:66.66%;left:0;right:0;height:1px;}

  /* Flash de pantalla (cámara frontal) */
  #screenFlash{position:absolute;inset:0;background:#fff;opacity:0;
    pointer-events:none;}
  #screenFlash.fire{animation:flashPulse .6s ease;}
  @keyframes flashPulse{0%{opacity:0}10%{opacity:.95}100%{opacity:0}}

  /* Destello obturador */
  #shutterFlash{position:absolute;inset:0;background:#000;opacity:0;
    pointer-events:none;}
  #shutterFlash.fire{animation:shutPulse .25s ease;}
  @keyframes shutPulse{0%{opacity:0}30%{opacity:.85}100%{opacity:0}}

  /* Cuenta atrás */
  #countdown{position:absolute;inset:0;display:none;align-items:center;
    justify-content:center;font-family:var(--num);font-size:34vw;font-weight:700;
    color:#fff;text-shadow:0 4px 40px rgba(0,0,0,.6);}
  #countdown.on{display:flex;animation:tick 1s ease infinite;}
  @keyframes tick{0%{transform:scale(.7);opacity:0}25%{opacity:1}
    80%{transform:scale(1);opacity:1}100%{opacity:0}}

  /* Aviso permisos / error */
  #notice{position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;padding:32px;text-align:center;}
  #notice.on{display:flex;}
  #notice .ico{font-size:54px;}
  #notice p{max-width:300px;line-height:1.5;color:rgba(255,255,255,.85);}
  #notice button{margin-top:8px;padding:13px 26px;border:none;border-radius:30px;
    background:var(--accent);color:#1a1200;font-weight:700;font-size:16px;}

  /* ---------- Barra superior ---------- */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:5;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display:flex;justify-content:center;gap:10px;
    background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);}
  .pill{display:flex;align-items:center;justify-content:center;gap:6px;
    min-width:48px;height:44px;padding:0 12px;border-radius:22px;
    background:var(--glass);border:1px solid var(--border);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font-size:13px;font-weight:600;transition:transform .12s ease,background .2s ease;}
  .pill:active{transform:scale(.92);}
  .pill.active{background:var(--accent);color:#1a1200;border-color:transparent;}
  .pill .ico{font-size:19px;line-height:1;}
  .pill[hidden]{display:none;}

  /* ---------- Zoom ---------- */
  #zoomWrap{position:absolute;left:0;right:0;bottom:160px;z-index:4;
    display:none;justify-content:center;}
  #zoomWrap.on{display:flex;}
  #zoomWrap input{width:64%;accent-color:var(--accent);}

  /* ---------- Barra inferior ---------- */
  #bottombar{position:relative;z-index:5;
    padding:18px 30px calc(env(safe-area-inset-bottom) + 22px);
    display:grid;grid-template-columns:64px 1fr 64px;align-items:center;
    background:linear-gradient(to top,rgba(0,0,0,.6),transparent);}

  #thumb{width:56px;height:56px;border-radius:14px;border:2px solid var(--border);
    overflow:hidden;background:var(--glass);display:flex;align-items:center;
    justify-content:center;font-size:22px;}
  #thumb img{width:100%;height:100%;object-fit:cover;}

  #shutter{justify-self:center;width:80px;height:80px;border-radius:50%;
    border:none;background:transparent;position:relative;display:grid;place-items:center;}
  #shutter .ring{position:absolute;inset:0;border-radius:50%;
    border:4px solid rgba(255,255,255,.9);}
  #shutter .core{width:64px;height:64px;border-radius:50%;background:#fff;
    transition:transform .12s ease,background .2s ease;}
  #shutter:active .core{transform:scale(.86);}
  #shutter.busy .core{background:var(--accent);}
  /* anillo de progreso del temporizador */
  #shutter svg{position:absolute;inset:-2px;width:84px;height:84px;
    transform:rotate(-90deg);opacity:0;transition:opacity .2s;}
  #shutter.timing svg{opacity:1;}
  #shutter circle{fill:none;stroke:var(--accent);stroke-width:4;
    stroke-linecap:round;}

  #flip{justify-self:center;width:56px;height:56px;border-radius:50%;
    background:var(--glass);border:1px solid var(--border);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font-size:24px;display:grid;place-items:center;transition:transform .3s ease;}
  #flip:active{transform:rotate(180deg) scale(.9);}

  /* ---------- Visor de foto ---------- */
  #viewer{position:fixed;inset:0;z-index:20;background:#000;display:none;
    flex-direction:column;}
  #viewer.on{display:flex;}
  #viewer .pic{flex:1;display:flex;align-items:center;justify-content:center;
    padding:env(safe-area-inset-top) 0 0;}
  #viewer img{max-width:100%;max-height:100%;object-fit:contain;}
  #viewer .bar{display:flex;justify-content:space-around;align-items:center;
    padding:20px 16px calc(env(safe-area-inset-bottom) + 20px);
    background:rgba(0,0,0,.7);}
  #viewer .bar button{background:none;border:none;color:#fff;font-size:14px;
    display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 14px;}
  #viewer .bar .ico{font-size:24px;}
  #viewer .bar .del{color:#ff6b6b;}
  #viewer .close{position:absolute;top:calc(env(safe-area-inset-top) + 12px);
    left:16px;width:42px;height:42px;border-radius:50%;background:var(--glass);
    border:1px solid var(--border);color:#fff;font-size:20px;
    backdrop-filter:blur(10px);}

  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" autoplay muted playsinline></video>
    <div id="grid"><span></span></div>
    <div id="shutterFlash"></div>
    <div id="screenFlash"></div>
    <div id="countdown"></div>

    <div id="notice">
      <div class="ico">📷</div>
      <p id="noticeTxt">Necesito permiso para usar la cámara. Acéptalo y pulsa el botón.</p>
      <button id="retry">Activar cámara</button>
    </div>

    <div id="topbar">
      <button class="pill" id="btnFlash" title="Flash">
        <span class="ico">⚡</span><span id="flashLbl">Off</span>
      </button>
      <button class="pill" id="btnTimer" title="Temporizador">
        <span class="ico">⏱</span><span id="timerLbl">Off</span>
      </button>
      <button class="pill" id="btnGrid" title="Cuadrícula">
        <span class="ico">▦</span>
      </button>
      <button class="pill" id="btnZoom" title="Zoom" hidden>
        <span class="ico">🔍</span><span id="zoomLbl">1×</span>
      </button>
    </div>

    <div id="zoomWrap">
      <input type="range" id="zoom" min="1" max="1" step="0.1" value="1">
    </div>
  </div>

  <div id="bottombar">
    <button id="thumb" aria-label="Última foto"><span>🖼️</span></button>

    <button id="shutter" aria-label="Hacer foto">
      <svg viewBox="0 0 84 84"><circle id="prog" cx="42" cy="42" r="40"></circle></svg>
      <div class="ring"></div>
      <div class="core"></div>
    </button>

    <button id="flip" aria-label="Cambiar cámara">🔄</button>
  </div>
</div>

<!-- Visor a pantalla completa -->
<div id="viewer">
  <button class="close" id="vClose">✕</button>
  <div class="pic"><img id="vImg" alt="Foto"></div>
  <div class="bar">
    <button id="vShare"><span class="ico">📤</span>Compartir</button>
    <button id="vSave"><span class="ico">⬇️</span>Guardar</button>
    <button id="vDel" class="del"><span class="ico">🗑️</span>Borrar</button>
  </div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
"use strict";
(function(){
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const grid     = document.getElementById('grid');
  const notice   = document.getElementById('notice');
  const noticeTxt= document.getElementById('noticeTxt');
  const shutter  = document.getElementById('shutter');
  const prog     = document.getElementById('prog');
  const thumb    = document.getElementById('thumb');
  const flip     = document.getElementById('flip');
  const sFlash   = document.getElementById('screenFlash');
  const shutFlash= document.getElementById('shutterFlash');
  const countdown= document.getElementById('countdown');

  const btnFlash = document.getElementById('btnFlash');
  const btnTimer = document.getElementById('btnTimer');
  const btnGrid  = document.getElementById('btnGrid');
  const btnZoom  = document.getElementById('btnZoom');
  const flashLbl = document.getElementById('flashLbl');
  const timerLbl = document.getElementById('timerLbl');
  const zoomLbl  = document.getElementById('zoomLbl');
  const zoomWrap = document.getElementById('zoomWrap');
  const zoom     = document.getElementById('zoom');

  const viewer   = document.getElementById('viewer');
  const vImg     = document.getElementById('vImg');
  const vClose   = document.getElementById('vClose');
  const vShare   = document.getElementById('vShare');
  const vSave    = document.getElementById('vSave');
  const vDel     = document.getElementById('vDel');

  // ---- Estado ----
  let stream=null, track=null, caps={}, busy=false;
  let facing='environment';                 // 'environment' | 'user'
  const FLASH=['off','flash','torch'];      // ciclo
  const FLASH_LBL={off:'Off',flash:'Flash',torch:'Linterna'};
  let flashMode='off';
  const TIMERS=[0,3,10];
  let timerIdx=0;
  let gridOn=false;
  const gallery=[];                          // {url, ts}
  let viewerIndex=-1;

  // Progreso (circunferencia)
  const R=40, CIRC=2*Math.PI*R;
  prog.style.strokeDasharray=CIRC;
  prog.style.strokeDashoffset=CIRC;

  // ---------- Cámara ----------
  async function startCamera(){
    notice.classList.remove('on');
    stopStream();
    const constraints={
      audio:false,
      video:{
        facingMode: facing==='user' ? 'user' : {ideal:'environment'},
        width:{ideal:1920}, height:{ideal:1080}
      }
    };
    try{
      stream=await navigator.mediaDevices.getUserMedia(constraints);
    }catch(e){
      // Reintento sin facingMode estricto
      try{ stream=await navigator.mediaDevices.getUserMedia({audio:false,video:true}); }
      catch(err){ return showNotice(err); }
    }
    video.srcObject=stream;
    track=stream.getVideoTracks()[0];
    video.classList.toggle('mirror', facing==='user');
    try{ caps=track.getCapabilities ? track.getCapabilities() : {}; }catch(_){ caps={}; }
    setupZoom();
    refreshFlashUI();
    applyFlashState();   // por si quedaba linterna encendida
  }

  function stopStream(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; track=null; }
  }

  function showNotice(err){
    notice.classList.add('on');
    if(err && (err.name==='NotAllowedError' || err.name==='SecurityError')){
      noticeTxt.textContent='Permiso de cámara denegado. Actívalo en los ajustes de la app y vuelve a intentarlo.';
    }else if(err && err.name==='NotFoundError'){
      noticeTxt.textContent='No se ha encontrado ninguna cámara en el dispositivo.';
    }else{
      noticeTxt.textContent='No se pudo iniciar la cámara. Pulsa el botón para reintentar.';
    }
  }

  // ---------- Zoom ----------
  function setupZoom(){
    if(caps.zoom && caps.zoom.max>caps.zoom.min){
      btnZoom.hidden=false;
      zoom.min=caps.zoom.min; zoom.max=caps.zoom.max;
      zoom.step=caps.zoom.step||0.1;
      zoom.value=track.getSettings().zoom||caps.zoom.min;
      zoomLbl.textContent=fmtZoom(zoom.value);
    }else{
      btnZoom.hidden=true; zoomWrap.classList.remove('on');
    }
  }
  function fmtZoom(v){ return (Math.round(v*10)/10).toString().replace('.0','')+'×'; }
  zoom.addEventListener('input',async()=>{
    zoomLbl.textContent=fmtZoom(zoom.value);
    try{ await track.applyConstraints({advanced:[{zoom:parseFloat(zoom.value)}]}); }catch(_){}
  });
  btnZoom.addEventListener('click',()=>zoomWrap.classList.toggle('on'));

  // ---------- Flash ----------
  function refreshFlashUI(){
    // La trasera usa torch hardware; la frontal usa flash de pantalla.
    const hasTorch = !!caps.torch;
    if(facing==='environment' && !hasTorch && flashMode==='torch'){ flashMode='flash'; }
    flashLbl.textContent=FLASH_LBL[flashMode];
    btnFlash.classList.toggle('active', flashMode!=='off');
    // En frontal sin torch, "Linterna" no aplica → la saltamos al ciclar.
  }
  btnFlash.addEventListener('click',()=>{
    let i=FLASH.indexOf(flashMode);
    do{ i=(i+1)%FLASH.length; }
    while(FLASH[i]==='torch' && !(facing==='environment' && caps.torch));
    flashMode=FLASH[i];
    applyFlashState();
    refreshFlashUI();
  });
  async function applyFlashState(){
    // Mantiene la linterna encendida solo en modo 'torch' con cámara trasera.
    if(track && caps.torch){
      const on = (flashMode==='torch' && facing==='environment');
      try{ await track.applyConstraints({advanced:[{torch:on}]}); }catch(_){}
    }
  }

  // ---------- Temporizador ----------
  btnTimer.addEventListener('click',()=>{
    timerIdx=(timerIdx+1)%TIMERS.length;
    const t=TIMERS[timerIdx];
    timerLbl.textContent = t===0 ? 'Off' : t+'s';
    btnTimer.classList.toggle('active', t!==0);
  });

  // ---------- Cuadrícula ----------
  btnGrid.addEventListener('click',()=>{
    gridOn=!gridOn;
    grid.classList.toggle('on',gridOn);
    btnGrid.classList.toggle('active',gridOn);
  });

  // ---------- Cambiar cámara ----------
  flip.addEventListener('click',async()=>{
    if(busy) return;
    facing = facing==='user' ? 'environment' : 'user';
    await startCamera();
  });

  // ---------- Disparo ----------
  shutter.addEventListener('click',()=>{
    if(busy || !track) return;
    const secs=TIMERS[timerIdx];
    if(secs>0) runTimer(secs).then(takePhoto);
    else takePhoto();
  });

  function runTimer(secs){
    busy=true; shutter.classList.add('busy','timing');
    return new Promise(resolve=>{
      let remaining=secs;
      countdown.textContent=remaining;
      countdown.classList.add('on');
      setProgress(0);
      const start=performance.now(), total=secs*1000;
      const anim=()=>{
        const el=performance.now()-start;
        setProgress(Math.min(el/total,1));
        if(el<total) requestAnimationFrame(anim);
      };
      requestAnimationFrame(anim);
      const tick=setInterval(()=>{
        remaining--;
        if(remaining>0){ countdown.textContent=remaining; }
        else{
          clearInterval(tick);
          countdown.classList.remove('on');
          shutter.classList.remove('timing');
          setProgress(0);
          resolve();
        }
      },1000);
    });
  }
  function setProgress(p){ prog.style.strokeDashoffset = CIRC*(1-p); }

  async function takePhoto(){
    busy=true; shutter.classList.add('busy');
    try{
      // Flash
      if(flashMode==='flash'){
        if(facing==='environment' && caps.torch){
          try{ await track.applyConstraints({advanced:[{torch:true}]}); }catch(_){}
          await wait(120);
        }else{
          sFlash.classList.add('fire');      // flash de pantalla (frontal)
          await wait(160);
        }
      }
      drawFrame();
      shutFlash.classList.remove('fire'); void shutFlash.offsetWidth;
      shutFlash.classList.add('fire');
      tick();

      const url=canvas.toDataURL('image/jpeg',0.92);
      addToGallery(url);
    }catch(e){ console.error(e); }
    finally{
      if(flashMode==='flash' && facing==='environment' && caps.torch){
        try{ await track.applyConstraints({advanced:[{torch:false}]}); }catch(_){}
      }
      sFlash.classList.remove('fire');
      busy=false; shutter.classList.remove('busy');
    }
  }

  function drawFrame(){
    const w=video.videoWidth||1280, h=video.videoHeight||720;
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext('2d');
    if(facing==='user'){            // selfie: igual que en el visor
      ctx.translate(w,0); ctx.scale(-1,1);
    }
    ctx.drawImage(video,0,0,w,h);
    ctx.setTransform(1,0,0,1,0,0);
  }

  function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

  // ---------- Galería de sesión ----------
  function addToGallery(url){
    gallery.unshift({url,ts:Date.now()});
    if(gallery.length>60) gallery.pop();
    thumb.innerHTML=`<img src="${url}" alt="">`;
  }
  thumb.addEventListener('click',()=>{ if(gallery.length) openViewer(0); });

  function openViewer(i){
    viewerIndex=i;
    vImg.src=gallery[i].url;
    viewer.classList.add('on');
  }
  vClose.addEventListener('click',()=>viewer.classList.remove('on'));

  vSave.addEventListener('click',()=>{
    if(viewerIndex<0) return;
    download(gallery[viewerIndex]);
  });
  function download(item){
    const a=document.createElement('a');
    a.href=item.url;
    a.download='foto_'+new Date(item.ts).toISOString().replace(/[:.]/g,'-')+'.jpg';
    document.body.appendChild(a); a.click(); a.remove();
  }

  vShare.addEventListener('click',async()=>{
    if(viewerIndex<0) return;
    const item=gallery[viewerIndex];
    try{
      const blob=await (await fetch(item.url)).blob();
      const file=new File([blob],'foto.jpg',{type:'image/jpeg'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Foto'});
      }else{
        download(item);
      }
    }catch(_){ download(item); }
  });

  vDel.addEventListener('click',()=>{
    if(viewerIndex<0) return;
    gallery.splice(viewerIndex,1);
    if(gallery.length===0){
      viewer.classList.remove('on');
      thumb.innerHTML='<span>🖼️</span>';
    }else{
      viewerIndex=Math.min(viewerIndex,gallery.length-1);
      vImg.src=gallery[viewerIndex].url;
      thumb.innerHTML=`<img src="${gallery[0].url}" alt="">`;
    }
  });

  // Audio: clic suave de obturador
  let actx=null;
  function tick(){
    try{
      actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const o=actx.createOscillator(), g=actx.createGain();
      o.type='square'; o.frequency.value=1100;
      g.gain.setValueAtTime(.06,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+.08);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime+.08);
    }catch(_){}
  }

  // ---------- Arranque ----------
  document.getElementById('retry').addEventListener('click',startCamera);
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden) stopStream();
    else if(!stream) startCamera();
  });

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    notice.classList.add('on');
    noticeTxt.textContent='Este dispositivo o WebView no soporta el acceso a la cámara.';
  }else{
    startCamera();
  }
})();
</script>
</body>
</html>
